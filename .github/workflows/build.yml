# .github/workflows/build.yml
name: Simple Docker Build and Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Пишем имя образа вручную в нижнем регистре — независимо от имени репо
  IMAGE_NAME: ckv29/alpina-gpt

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.VPS_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            cd /root/django
            echo "=== DEBUG START ==="
            whoami
            pwd
            echo "--- All files ---"
            find . -maxdepth 2 -type f -name "*.txt" -o -name "Dockerfile" -o -name "docker-compose.yml"
            echo "--- requirements.txt content ---"
            cat requirements.txt | head -10
            echo "--- .dockerignore content ---"
            cat .dockerignore 2>/dev/null || echo "No .dockerignore"
            echo "--- Docker context test ---"
            docker build --no-cache -t test-context . 2>&1 | grep -E "(context|ERROR|requirements)"
            echo "=== DEBUG END ==="
  
            docker compose down && docker compose up -d
            docker logout ghcr.io

      - name: Logout from GitHub Container Registry
        if: always()
        run: docker logout ghcr.io