services:
  app:
    image: django_app1
    build:
      context: .
    ports:
      - "8000:8000"
    depends_on:
      - app-postgres


  app-postgres:
    image: postgres:15-alpine          # ✅ Исправлено: убран "-", image принимает строку, а не список
    ports:
      - "5432:5432"                    # ✅ Исправлено: корректный синтаксис портов
    volumes:
      - app-postgres:/var/lib/postgresql/data  # ✅ Исправлено: убраны кавычки и опечатки в пути
    environment:
      - POSTGRES_DB=django_app         # ✅ Исправлено: формат KEY=VALUE без пробелов вокруг =
      - POSTGRES_USER=user1
      - POSTGRES_PASSWORD=password1    # ✅ Исправлено: POSTGRESS → POSTGRES

volumes:
  app-postgres:
    name : "app-postgres"